<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">BoardGameShop | Početna</title>

    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="../css/index.css">
    <link rel="stylesheet" type="text/css" href="../css/globalStyle.css">
    <link rel="stylesheet" type="text/css" href="../css/navStyle.css">

    <script src="../js/translations.js"></script>
    <script src="../js/jquery.min.js"></script>
    <script src="../js/popper.min.js"></script>
    <script src="../js/bootstrap.bundle.js"></script>

    <script src="../js/dataHelper.js"></script>
    <script src="../js/index.js"></script>
    <link rel="icon" type="image/png" href="../img/storeLogo.png">
</head>

<body>
    <header class="header">
        <div class="store-header">
            <a href="index.html" class="store-brand">
                <img src="../img/storeLogo1.png" alt="BoardGameShop logo">
                <span id="store-name">BoardGameShop</span>
            </a>

            <div class="language-selector">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item dropdown mr-2">
                        <a class="nav-link dropdown-toggle text-dark" data-toggle="dropdown" id="currentLanguage">
                            <img id="currentLanguageFlag" src="../img/serbia.png" alt="Srpski" class="language-flag">
                            <span id="currentLanguageText"></span>
                        </a>

                        <div class="dropdown-menu language-menu dropdown-menu-right">
                            <a class="dropdown-item text-dark" id="changeLanguage">
                                <img id="changeLanguageFlag"
                                     src="../img/british.png" alt="English" class="language-flag">
                                <span id="changeLanguageText"></span>
                            </a>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
        <nav class="navbar navbar-expand-md navbar-dark p-4">
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse pl-3" id="collapsibleNavbar">
                <ul class="navbar-nav">
                    <li class="nav-item mr-2"><a class="nav-link active" href="index.html" data-i18n="home"></a></li>
                    <li class="nav-item mr-2"><a class="nav-link" href="gallery.html" data-i18n="gallery"></a></li>
                    <li class="nav-item mr-2"><a class="nav-link" href="catalog.html" data-i18n="catalog"></a></li>
                    <li class="nav-item dropdown mr-2">
                        <a class="nav-link dropdown-toggle" data-toggle="dropdown" href="#" data-i18n="category"></a>
                        <div class="dropdown-menu">
                            <a class="dropdown-item" href="strategy.html" data-i18n="strategy"></a>
                            <a class="dropdown-item" href="family.html" data-i18n="family"></a>
                            <a class="dropdown-item" href="fun.html" data-i18n="fun"></a>
                        </div>
                    </li>
                    <li class="nav-item dropdown mr-2">
                        <a class="nav-link dropdown-toggle" data-toggle="dropdown" data-i18n="account"></a>
                        <div class="dropdown-menu">
                            <a class="dropdown-item" href="cart.html" data-i18n="cart"></a>
                            <a class="dropdown-item" href="favorites.html" data-i18n="favourites"></a>
                            <a class="dropdown-item" href="orders.html" data-i18n="orders"></a>
                        </div>
                    </li>
                    <li class="nav-item mr-2"><a class="nav-link" href="about.html" data-i18n="about"></a></li>

                    <li class="nav-item dropdown d-md-none">
                        <a class="nav-link dropdown-toggle" data-toggle="dropdown" data-i18n="language"></a>

                        <div class="dropdown-menu">
                            <a class="dropdown-item" href="#" id="srLang">
                                <img src="../img/serbia.png"
                                     alt="Srpski"
                                     class="language-flag">
                                RS
                            </a>

                            <a class="dropdown-item" href="#" id="enLang">
                                <img src="../img/british.png"
                                     alt="English"
                                     class="language-flag">
                                GB
                            </a>
                        </div>
                    </li>

                </ul>

            </div>
        </nav>

    </header>



    <div class="container">
            <div id="homeCarousel"
                 class="carousel slide"
                 data-ride="carousel"
                 data-interval="5000">

                <!-- Tačkice dole -->
                <ol class="carousel-indicators">
                    <li data-target="#homeCarousel" data-slide-to="0" class="active"></li>
                    <li data-target="#homeCarousel" data-slide-to="1"></li>
                    <li data-target="#homeCarousel" data-slide-to="2"></li>
                </ol>


                <div class="carousel-inner">

                    <!-- PRVI SLAJD - AKCIJE -->
                    <div class="carousel-item active">
                        <div class="retro-slide sale-slide">
                            <div class="slide-content">
                                <span class="slide-label" data-i18n="sale-slide-title"></span>

                                <h2 data-i18n="sale-slide-h"></h2>

                                <p data-i18n="sale-slide-p">
                                </p>

                                <a href="#" class="retro-btn" data-target="#akcije" data-i18n="sale-slide-a">
                                </a>
                            </div>
                            <div class="slide-image">
                                <img src="../img/saleSlide.jpg" alt="Sale Banner">
                            </div>
                        </div>
                    </div>

                    <!-- DRUGI SLAJD - TURNIRI -->
                    <div class="carousel-item">
                        <div class="retro-slide tournament-slide">
                            <div class="slide-content">
                                <span class="slide-label" data-i18n="event-slide-title"></span>

                                <h2 data-i18n="event-slide-h"></h2>

                                <p data-i18n="event-slide-p">
                                </p>

                                <a href="#" class="retro-btn" data-target="#turniri" data-i18n="event-slide-a">
                                </a>
                            </div>
                            <div class="slide-image">
                                <img src="../img/catanTurnir.jpg" alt="Catan Turnir">
                            </div>
                        </div>
                    </div>


                    <!-- TREĆI SLAJD - NOVE IGRE -->
                    <div class="carousel-item">
                        <div class="retro-slide new-games-slide">
                            <div class="slide-content">
                                <span class="slide-label" data-i18n="new-slide-title"></span>

                                <h2 data-i18n="new-slide-h"></h2>

                                <p data-i18n="new-slide-p">
                                </p>

                                <a href="#" class="retro-btn" data-target="#katalog" data-i18n="new-slide-a">
                                </a>
                            </div>
                            <div class="slide-image">
                                <img src="../img/newGames.jpg" alt="New Games">
                            </div>
                        </div>
                    </div>

                </div>


                <!-- Strelica levo -->
                <a class="carousel-control-prev"
                   href="#homeCarousel"
                   role="button"
                   data-slide="prev">

                    <span class="carousel-control-prev-icon"></span>
                    <span class="sr-only" data-i18n="arrow-prev"></span>
                </a>


                <!-- Strelica desno -->
                <a class="carousel-control-next"
                   href="#homeCarousel"
                   role="button"
                   data-slide="next">

                    <span class="carousel-control-next-icon"></span>
                    <span class="sr-only" data-i18n="arrow-next"></span>
                </a>

            </div>

            <div class="row mt-4">
                <div class=" col-sm-6 col-md-3 left-title d-flex align-items-center">
                    <div class="retro-section-title">
                        <img src="../img/satarY.png" alt="star">
                        <h2 data-i18n="top-rated"></h2>
                    </div>
                </div>
            </div>

            <div class="row mt-3" id="najboljeOcenjene"></div>

        <hr class="gallery-shelf">
        <section id="akcije" class="container mt-5">
            <!-- Akcije i popusti -->
            <div class="retro-section-title">
                <h2 data-i18n="active-sales"></h2>
            </div>
            <div class="slide-wrapper justify-content-center">
                <!-- Nove igre -->

                <button class="slider-btn left" id="prevGamesa">
                    &#10094;
                </button>

                <div class="games-slider row" id="akcijeSlider">
                    <!-- Kartice se dinamički dodaju -->
                </div>

                <button class="slider-btn right" id="nextGamesa">
                    &#10095;
                </button>
            </div>
        </section>

        <hr class="gallery-shelf">
        <section id="katalog" class="container mt-5">
            <div class="retro-section-title">
                <h2 data-i18n="new-games"></h2>
            </div>
            <div class="slide-wrapper justify-content-center">
                <!-- Nove igre -->

                <button class="slider-btn left" id="prevGames">
                    &#10094;
                </button>

                <div class="games-slider row" id="noveIgreSlider">
                    <!-- Kartice se dinamički dodaju -->
                </div>

                <button class="slider-btn right" id="nextGames">
                    &#10095;
                </button>
            </div>
        </section>
        <hr class="gallery-shelf">
        <section id="turniri" class="container mt-5 mb-5">

            <div class="retro-section-title">
                <h2 data-i18n="events"></h2>
            </div>

            <div class="row mt-3">

                <div class="col-md-6 col-lg-4 mt-3">
                    <div class="event-card">
                        <div class="event-date">
                            <span class="day">25</span>
                            <span class="month" data-i18n="month-first-card"></span>
                        </div>

                        <div class="event-content">
                            <span class="event-tag" data-i18n="name-first-card"></span>
                            <h3 data-i18n="h-first-card"></h3>
                            <p data-i18n="p-first-card"></p>
                            <p data-i18n="price-first-card"></p>

                            <div class="event-info">
                                <span data-i18n="place-first-card"></span>
                                <span>🕒 18:00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 col-lg-4 mt-3">
                    <div class="event-card">
                        <div class="event-date">
                            <span class="day" data-i18n="day-second-card"></span>
                            <span class="month" data-i18n="month-second-card"></span>
                        </div>

                        <div class="event-content">
                            <span class="event-tag" data-i18n="name-second-card"></span>
                            <h3 data-i18n="h-second-card"></h3>
                            <p data-i18n="p-second-card"></p>
                            <p data-i18n="price-second-card"></p>

                            <div class="event-info">
                                <span data-i18n="place-second-card"></span>
                                <span>🕒 19:00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 col-lg-4 mt-3">
                    <div class="event-card">
                        <div class="event-date">
                            <span class="day">10</span>
                            <span class="month" data-i18n="month-third-card"></span>
                        </div>

                        <div class="event-content">
                            <span class="event-tag" data-i18n="name-third-card"></span>
                            <h3 data-i18n="h-third-card"></h3>
                            <p data-i18n="p-third-card"></p>
                            <p data-i18n="price-third-card"></p>

                            <div class="event-info">
                                <span data-i18n="place-third-card"></span>
                                <span>🕒 17:00</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </section>
    </div>

    <footer class="mt-3 pb-3">
        <div class="container">
            <div class="footer-content">

                <div class="footer-info">
                    <h4 data-i18n="footer-title"></h4>
                    <p data-i18n="footer-description"></p>
                </div>

                <div class="footer-links">
                    <h4 data-i18n="footer-links"></h4>

                    <a href="#" target="_blank"> <!--https://boardgamegeek.com/-->
                        BoardGameGeek
                    </a>

                    <a href="#" target="_blank"><!--https://www.catan.com/-->
                        Catan
                    </a>

                    <a href="#" target="_blank"><!--https://www.daysofwonder.com/-->
                        Days of Wonder
                    </a>
                </div>

            </div>
        </div>

        <div class="footer-bottom">
            <span data-i18n="footer-copyright"></span><br>
            Isidora • Vanja <br>
            <span data-i18n="footer-faculty">

        </span>
        </div>

    </footer>
</body>
</html>
