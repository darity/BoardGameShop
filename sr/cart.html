<!DOCTYPE html>
<html lang="sr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title  data-i18n="title">BoardGameShop | Korpa</title>

	<link rel="stylesheet" href="../css/bootstrap.css">
	<link rel="stylesheet" type="text/css" href="../css/index.css">
	<link rel="stylesheet" type="text/css" href="../css/globalStyle.css">
	<link rel="stylesheet" type="text/css" href="../css/navStyle.css">

	<script src="../js/jquery.min.js"></script>
	<script src="../js/popper.min.js"></script>
	<script src="../js/bootstrap.bundle.js"></script>

	<script src="../js/translations.js"></script>
	<script src="../js/dataHelper.js"></script>
	<script src="../js/cartHelper.js"></script>
	<script src="../js/cart.js"></script>
	<link rel="icon" type="image/png" href="../img/storeLogo.png">
</head>

<body>
<header class="header">
	<div class="store-header">
		<a href="index.html" class="store-brand">
			<img src="../img/storeLogo1.png" alt="BoardGameShop logo">
			<span id="store-name">BoardGameShop</span>
		</a>

		<div class="language-selector">
			<ul class="navbar-nav ml-auto">
				<li class="nav-item dropdown mr-2">
					<a class="nav-link dropdown-toggle text-dark" data-toggle="dropdown" id="currentLanguage">
						<img id="currentLanguageFlag" src="../img/serbia.png" alt="Srpski" class="language-flag">
						<span id="currentLanguageText"></span>
					</a>

					<div class="dropdown-menu language-menu dropdown-menu-right">
						<a class="dropdown-item text-dark" id="changeLanguage">
							<img id="changeLanguageFlag"
							     src="../img/british.png" alt="English" class="language-flag">
							<span id="changeLanguageText"></span>
						</a>
					</div>
				</li>
			</ul>
		</div>
	</div>
	<nav class="navbar navbar-expand-md navbar-dark p-4">
		<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse pl-3" id="collapsibleNavbar">
			<ul class="navbar-nav">
				<li class="nav-item mr-2"><a class="nav-link" href="index.html" data-i18n="home"></a></li>
				<li class="nav-item mr-2"><a class="nav-link" href="gallery.html" data-i18n="gallery"></a></li>
				<li class="nav-item mr-2"><a class="nav-link" href="catalog.html" data-i18n="catalog"></a></li>
				<li class="nav-item dropdown mr-2">
					<a class="nav-link dropdown-toggle" data-toggle="dropdown" href="#" data-i18n="category"></a>
					<div class="dropdown-menu">
						<a class="dropdown-item" href="strategy.html" data-i18n="strategy"></a>
						<a class="dropdown-item" href="family.html" data-i18n="family"></a>
						<a class="dropdown-item" href="fun.html" data-i18n="fun"></a>
					</div>
				</li>
				<li class="nav-item dropdown mr-2">
					<a class="nav-link dropdown-toggle active" data-toggle="dropdown" data-i18n="account"></a>
					<div class="dropdown-menu">
						<a class="dropdown-item" href="cart.html" data-i18n="cart"></a>
						<a class="dropdown-item" href="favorites.html" data-i18n="favourites"></a>
						<a class="dropdown-item" href="orders.html" data-i18n="orders"></a>
					</div>
				</li>
				<li class="nav-item mr-2"><a class="nav-link" href="about.html" data-i18n="about"></a></li>

				<li class="nav-item dropdown d-md-none">
					<a class="nav-link dropdown-toggle" data-toggle="dropdown" data-i18n="language"></a>

					<div class="dropdown-menu">
						<a class="dropdown-item" href="#" id="srLang">
							<img src="../img/serbia.png"
							     alt="Srpski"
							     class="language-flag">
							RS
						</a>

						<a class="dropdown-item" href="#" id="enLang">
							<img src="../img/british.png"
							     alt="English"
							     class="language-flag">
							GB
						</a>
					</div>
				</li>

			</ul>

		</div>
	</nav>

</header>

<div class="container ">

	<nav aria-label="breadcrumb" class="mt-3">
		<ol class="breadcrumb">
			<li class="breadcrumb-item"><a href="index.html" data-i18n="home"></a></li>
			<li class="breadcrumb-item"><a href="#" data-i18n="account"></a></li>
			<li class="breadcrumb-item"><a data-i18n="cart"></a></li>
		</ol>
	</nav>

	<h2 class="mb-4" data-i18n="cart-title">🛒 Korpa</h2>

	<div class="card shadow-sm">

		<div class="card-body p-0">

			<div class="list-group list-group-flush" id="listaKorpe">

			</div>

		</div>

	</div>

	<div class="mt-4 text-end">

		<h4><span data-i18n="cart-total">Ukupno:</span> <span id="ukupnaCena">0 RSD</span></h4>

	</div>

	<hr class="my-5">

	<h3 class="mb-4" data-i18n="cart-delivery-info">Podaci za dostavu</h3>

	<div class="row g-3">

		<div class="col-md-6">
			<label for="fullName" class="form-label" data-i18n="cart-full-name">Ime i prezime</label>
			<input type="text" class="form-control" id="fullName">
			<small class="text-danger" id="fullNameError"></small>
		</div>

		<div class="col-md-6">
			<label for="phone" class="form-label" data-i18n="cart-phone">Telefon</label>
			<input type="text" class="form-control" id="phone">
			<small class="text-danger" id="phoneError"></small>
		</div>

		<div class="col-md-8">
			<label for="address" class="form-label" data-i18n="cart-address">Adresa</label>
			<input type="text" class="form-control" id="address">
			<small class="text-danger" id="addressError"></small>
		</div>

		<div class="col-md-4">
			<label for="postalCode" class="form-label" data-i18n="cart-postal-code">Poštanski broj</label>
			<input type="text" class="form-control" id="postalCode">
			<small class="text-danger" id="postalCodeError"></small>
		</div>

		<div class="col-md-6">
			<label for="city" class="form-label" data-i18n="cart-city">Grad</label>
			<input type="text" class="form-control" id="city">
			<small class="text-danger" id="cityError"></small>
		</div>

	</div>

	<div class="text-end mt-4">

		<button class="btn btn-dark btn-lg" id="order" data-i18n="cart-order">
			Poruči
		</button>

	</div>

</div>

<footer class="mt-3 pb-3">
	<div class="container">
		<div class="footer-content">

			<div class="footer-info">
				<h4 data-i18n="footer-title"></h4>
				<p data-i18n="footer-description"></p>
			</div>

			<div class="footer-links">
				<h4 data-i18n="footer-links"></h4>

				<a href="#" target="_blank"> <!--https://boardgamegeek.com/-->
					BoardGameGeek
				</a>

				<a href="#" target="_blank"><!--https://www.catan.com/-->
					Catan
				</a>

				<a href="#" target="_blank"><!--https://www.daysofwonder.com/-->
					Days of Wonder
				</a>
			</div>

		</div>
	</div>

	<div class="footer-bottom">
		<span data-i18n="footer-copyright"></span><br>
		Isidora • Vanja <br>
		<span data-i18n="footer-faculty">

        </span>
	</div>

</footer>
</body>
</html>
